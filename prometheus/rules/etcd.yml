groups:
  - name: etcd
    rules:
      - alert: EtcdDown
        expr: up{job="etcd"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "etcd instance {{ $labels.instance }} down"
          description: "etcd has been down for more than 1 minute."

      - alert: EtcdHighLatency
        expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "etcd high latency detected"
          description: "etcd WAL fsync latency is {{ $value }}s (threshold: 0.5s)"

      - alert: EtcdDiskSpaceHigh
        expr: (etcd_mvcc_db_total_size_in_bytes / etcd_server_quota_backend_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "etcd disk space usage high"
          description: "etcd database is {{ $value }}% full (threshold: 80%)"

      - alert: EtcdLeaderChanges
        expr: rate(etcd_server_leader_changes_seen_total[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "etcd leader changes detected"
          description: "{{ $value }} leader changes in the last hour"
